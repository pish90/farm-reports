spring:
  application:
    name: farm-reports-api

  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/farm_reports}
    username: ${DB_USERNAME:farm_user}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${PORT:8080}
  address: 0.0.0.0
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:change-this-to-a-secure-256-bit-secret-in-production}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    com.farmreports: ${LOG_LEVEL:INFO}
    org.springframework.security: INFO
